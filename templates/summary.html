{% extends "base.html" %}
{% load humanize %}

{% block content %}
<h2 class="mb-4">集計データ（直近12ヶ月）</h2>

<div class="card shadow-sm mb-4">
  <div class="card-body">
    <h5 class="card-title mb-3">生活費</h5>
    <div class="chart-wrapper chart-wrapper--bar" style="position: relative; height: 340px;">
      <canvas id="fixedVariableBar"></canvas>
    </div>
  </div>
  <div class="card-footer text-muted small">
    直近1年間の生活費を表示します。
  </div>
</div>

<div class="card shadow-sm mb-4">
  <div class="card-body">
    <h5 class="card-title mb-3">大型費用</h5>
    <div class="chart-wrapper chart-wrapper--bar" style="position: relative; height: 300px;">
      <canvas id="largeCostBar"></canvas>
    </div>
  </div>
  <div class="card-footer text-muted small">
    直近1年間で不定期に発生した大型費用を表示します。
  </div>
</div>

<div class="card shadow-sm mb-4">
  <div class="card-body">
    <h5 class="card-title mb-3">費用分担</h5>
    <p class="text-muted small mb-2">
      <span class="badge" style="background-color:#1fb6ca;">青 (プラス)</span> 夫の負担大
      <span class="badge" style="background-color:#da1a1a;">赤 (マイナス)</span> 妻の負担大
    </p>
    <div class="chart-wrapper chart-wrapper--bar" style="position: relative; height: 300px;">
      <canvas id="costSplitBar"></canvas>
    </div>
  </div>
  <div class="card-footer text-muted small">
    (変動費＋固定費)÷2 − 家賃 を月別に表示。プラスなら夫の負担が大きく、マイナスなら妻の負担が大きいことを示します。2026年1月以降のデータ。
  </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
  const labels = {{ labels|safe }};
  const fixedSeries = {{ fixed_series|safe }};
  const variableSeries = {{ variable_series|safe }};
  const largeSeries = {{ large_series|safe }};
  const splitLabels = {{ split_labels|safe }};
  const costSplitSeries = {{ cost_split_series|safe }};
  const currentYear = {{ current_year }};
  const fixedVariableCtx = document.getElementById('fixedVariableBar').getContext('2d');
  const largeCostCtx = document.getElementById('largeCostBar').getContext('2d');
  const costSplitCtx = document.getElementById('costSplitBar').getContext('2d');

  // 表示用のラベルに変換（共通関数）
  function toDisplayLabel(l) {
    const [yStr, mStr] = l.split("-");
    const y = parseInt(yStr, 10);
    const m = parseInt(mStr, 10);
    if (y === currentYear) {
      return String(m);
    } else {
      return "'" + m;
    }
  }
  const displayLabels = labels.map(toDisplayLabel);
  const splitDisplayLabels = splitLabels.map(toDisplayLabel);


  new Chart(fixedVariableCtx, {
    type: 'bar',
    data: {
      labels: displayLabels,
      datasets: [
        {
          label: '固定費',
          data: fixedSeries,
          backgroundColor: '#4E79A7',
          stack: 'fixedVariableStack'
        },
        {
          label: '変動費',
          data: variableSeries,
          backgroundColor: '#59A14F',
          stack: 'fixedVariableStack'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'bottom' },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const v = ctx.parsed.y || 0;
              return `${ctx.dataset.label}: ${v.toLocaleString()} 円`;
            }
          }
        }
      },
      scales: {
        x: {
          stacked: true,
          ticks: {
            autoSkip: false,      // ← これで省略しない
            maxRotation: 0,
            minRotation: 0,
          }
        },
        y: {
          stacked: true,
          beginAtZero: true,
          ticks: {
            stepSize: 20000,
            callback: function(value) { return value.toLocaleString() + ' 円'; }
          }
        }
      }
    }
  });

  new Chart(largeCostCtx, {
    type: 'bar',
    data: {
      labels: displayLabels,
      datasets: [
        {
          label: '大型費用',
          data: largeSeries,
          backgroundColor: '#D93F3C'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'bottom' },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const v = ctx.parsed.y || 0;
              return `${ctx.dataset.label}: ${v.toLocaleString()} 円`;
            }
          }
        }
      },
      scales: {
        x: {
          stacked: true,
          ticks: {
            autoSkip: false,      // ← これで省略しない
            maxRotation: 0,
            minRotation: 0,
          }
        },
        y: {
          beginAtZero: true,
          ticks: {
            stepSize: 20000,
            callback: function(value) { return value.toLocaleString() + ' 円'; }
          }
        }
      }
    }
  });

  new Chart(costSplitCtx, {
    type: 'bar',
    data: {
      labels: splitDisplayLabels,
      datasets: [
        {
          label: '費用差額 (総額÷2 − 家賃)',
          data: costSplitSeries,
          backgroundColor: costSplitSeries.map(v => v >= 0 ? '#1fb6cacc' : '#da1a1acc'),
          borderColor:     costSplitSeries.map(v => v >= 0 ? '#1fb6caff' : '#da1a1aff'),
          borderWidth: 1,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const v = ctx.parsed.y || 0;
              const sign = v >= 0 ? '夫の負担が大きい' : '妻の負担が大きい';
              return `差額: ${v.toLocaleString()} 円 (${sign})`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            autoSkip: false,
            maxRotation: 0,
            minRotation: 0,
          }
        },
        y: {
          beginAtZero: false,
          ticks: {
            callback: function(value) { return value.toLocaleString() + ' 円'; }
          }
        }
      }
    }
  });
</script>
{% endblock %}
